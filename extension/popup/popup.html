<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Textube</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="logo">Textube</h1>
      <span class="version">v2.1</span>
    </header>

    <main class="main">
      <!-- Video Info -->
      <div class="video-info" id="videoInfo">
        <div class="video-title" id="videoTitle">Loading...</div>
      </div>

      <!-- URL Input (任意：閲覧中のページに依存しない取得経路) -->
      <div class="url-input-row">
        <label for="urlInput" class="url-label">URLから取得（任意）</label>
        <input type="text" id="urlInput" placeholder="YouTube URL または 動画ID を貼り付け" spellcheck="false" autocomplete="off">
        <div class="url-hint" id="urlHint"></div>
      </div>

      <!-- Settings -->
      <div class="settings">
        <div class="setting-row checkbox">
          <input type="checkbox" id="includeTimestamp">
          <label for="includeTimestamp">Include timestamps</label>
        </div>
      </div>

      <!-- Extract Button -->
      <button id="extractBtn" class="btn btn-primary">
        Extract Subtitles
      </button>

      <!-- Loading -->
      <div class="loading" id="loading" style="display: none;">
        <div class="spinner"></div>
        <span>Extracting...</span>
      </div>

      <!-- Result -->
      <div class="result" id="result" style="display: none;">
        <div class="result-header">
          <span class="result-title">Result</span>
          <span class="result-count" id="resultCount"></span>
        </div>
        <textarea id="subtitleText" readonly></textarea>
        <div class="result-actions">
          <button id="copyBtn" class="btn btn-secondary">Copy</button>
          <button id="copyWithPromptBtn" class="btn btn-primary">Copy with Prompt</button>
          <button id="downloadBtn" class="btn btn-secondary">Download</button>
        </div>
      </div>

      <!-- Error -->
      <div class="error" id="error" style="display: none;">
        <p id="errorText"></p>
      </div>
    </main>

    <footer class="footer">
      <div class="server-status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Checking...</span>
        <span class="footer-spacer"></span>
        <button type="button" id="settingsBtn" class="icon-btn" title="プロンプトを編集">⚙</button>
      </div>
    </footer>
  </div>

  <!-- Prompt Edit Modal -->
  <div class="modal-overlay" id="promptModal" style="display: none;">
    <div class="modal">
      <div class="modal-header">
        <h2>要約プロンプトの編集</h2>
        <button type="button" class="modal-close" id="modalCloseBtn" title="閉じる">×</button>
      </div>
      <div class="modal-body">
        <p class="modal-hint">「Copy with Prompt」ボタン押下時に字幕の前に挿入されるプロンプト</p>
        <textarea id="promptEditor" spellcheck="false"></textarea>
      </div>
      <div class="modal-footer">
        <button type="button" id="promptResetBtn" class="btn btn-secondary">初期値に戻す</button>
        <button type="button" id="promptCancelBtn" class="btn btn-secondary">キャンセル</button>
        <button type="button" id="promptSaveBtn" class="btn btn-primary">保存</button>
      </div>
    </div>
  </div>

  <!-- Copy Success Toast -->
  <div class="toast" id="toast" style="display: none;">Copied!</div>

  <script src="popup.js"></script>
</body>
</html>
